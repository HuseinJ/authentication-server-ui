name: Build and Push Frontend
on:
  workflow_dispatch:
    inputs:
      BACKEND_API_URL:
        description: 'Backend API URL'
        required: true
        default: 'https://authapi.hjusic.com'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/huseinj/auth-ui
      # Set a default backend URL that will be used for push events
      BACKEND_API_URL: ${{ github.event.inputs.BACKEND_API_URL || 'http://localhost:8081' }}
    
    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3
      
      # 2. Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "value=$(date -u +%Y%m%d%H%M%S)-$(echo "$GITHUB_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # 3. Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            --build-arg BACKEND_API_URL=${{ env.BACKEND_API_URL }} \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${{ steps.tag.outputs.value }} .
      
      # 4. Push Docker image
      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ steps.tag.outputs.value }} 
